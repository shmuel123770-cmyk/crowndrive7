<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrownDrive Auto Fix</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f6;margin:0;padding:30px;color:#111;direction:rtl} .box{max-width:760px;margin:auto;background:white;border-radius:18px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)} h1{margin-top:0}.drop{border:2px dashed #3f6b8e;border-radius:16px;padding:35px;text-align:center;background:#f6f9fc} input{margin:18px 0}.btn{background:#3f6b8e;color:white;border:0;border-radius:10px;padding:14px 24px;font-weight:bold;cursor:pointer}.ok{color:#167a49;font-weight:bold}.err{color:#c00;font-weight:bold} code{background:#f0f0f0;padding:2px 5px;border-radius:5px}
</style>
</head>
<body>
<div class="box">
<h1>תיקון CrownDrive — רכבים לא מרוחים</h1>
<p>תבחר כאן את קובץ האתר שלך, למשל <code>crowndrive_mobile_optimized.html</code> או <code>index.html</code>. הכלי יוציא לך קובץ חדש בשם <code>index.html</code> מוכן להעלאה ל־Netlify.</p>
<div class="drop">
<input id="file" type="file" accept=".html,text/html">
<br>
<button class="btn" onclick="fixFile()">תקן ותוריד index.html</button>
<p id="msg"></p>
</div>
<p>אחרי ההורדה: תעלה את הקובץ <code>index.html</code> ל־Netlify ב־Deploys → Drag and drop.</p>
</div>
<script>
const FIX = `

/* ================= CROWNDRIVE VEHICLE LAYOUT FIX ================= */
#fleet .grid,
.grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fit, minmax(280px, 360px)) !important;
  justify-content: center !important;
  align-items: stretch !important;
  gap: 24px !important;
  width: 100% !important;
  max-width: 1200px !important;
  margin-inline: auto !important;
  padding-inline: 0 !important;
}

#fleet .card,
.card {
  width: 100% !important;
  max-width: 360px !important;
  min-width: 0 !important;
  position: relative !important;
  transform: none !important;
  animation: none !important;
  transition: box-shadow .2s ease, border-color .2s ease !important;
}

#fleet .card:hover,
.card:hover {
  transform: none !important;
}

#fleet .gallery,
.gallery {
  width: 100% !important;
  height: 220px !important;
  aspect-ratio: auto !important;
  overflow: hidden !important;
}

#fleet .gallery img,
.gallery img {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  display: block !important;
  transform: none !important;
  animation: none !important;
  transition: none !important;
}

#fleet .card:hover .gallery img,
.card:hover .gallery img {
  transform: none !important;
}

#fleet .card,
#fleet .card *,
.card,
.card * {
  animation-name: none !important;
}

#fleet .empty,
.empty {
  grid-column: 1 / -1 !important;
  max-width: none !important;
}

@media (max-width: 900px) {
  #fleet .grid,
  .grid {
    grid-template-columns: repeat(2, minmax(260px, 1fr)) !important;
    gap: 18px !important;
  }
  #fleet .card,
  .card {
    max-width: none !important;
  }
}

@media (max-width: 600px) {
  #fleet .grid,
  .grid {
    grid-template-columns: 1fr !important;
    gap: 16px !important;
    padding-inline: 14px !important;
  }
  #fleet .card,
  .card {
    max-width: 100% !important;
  }
  #fleet .gallery,
  .gallery {
    height: 190px !important;
  }
}
/* ================= END CROWNDRIVE VEHICLE LAYOUT FIX ================= */
`;

function download(name, text){
  const blob = new Blob([text], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);
}

async function fixFile(){
  const f = document.getElementById('file').files[0];
  const msg = document.getElementById('msg');
  if(!f){msg.className='err'; msg.textContent='תבחר קודם את קובץ ה־HTML שלך'; return;}
  let html = await f.text();
  html = html.replace(/\/\* ================= CROWNDRIVE VEHICLE LAYOUT FIX[\s\S]*?END CROWNDRIVE VEHICLE LAYOUT FIX ================= \*\//g,'');
  if(html.includes('</style>')){
    html = html.replace('</style>', FIX + '\n</style>');
  } else if(html.includes('</head>')){
    html = html.replace('</head>', '<style>' + FIX + '</style>\n</head>');
  } else {
    html = '<style>' + FIX + '</style>\n' + html;
  }
  download('index.html', html);
  msg.className='ok';
  msg.textContent='סודר. ירד לך קובץ index.html — אותו תעלה ל־Netlify.';
}
</script>
</body>
</html>
