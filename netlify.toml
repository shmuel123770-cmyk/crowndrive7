[build]
  command = "rm -rf node_modules package-lock.json && npm install --no-audit --no-fund --omit=dev"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "firebase-admin",
    "@firebase/database-compat",
    "@google-cloud/firestore",
    "@google-cloud/storage",
    "google-auth-library",
    "google-gax",
    "gaxios",
    "gcp-metadata",
    "gtoken",
    "retry-request",
    "teeny-request",
    "farmhash-modern"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
