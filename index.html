<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
  <meta name="theme-color" content="#1B222B">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Social sharing (WhatsApp / Facebook / iMessage) + SEO. og:image/url are absolute (crawlers need that) so the build leaves them untouched. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Crown Drive">
  <meta property="og:locale" content="he_IL">
  <meta property="og:title" content="Crown Drive · השכרת רכבים · קראון הייטס">
  <meta property="og:description" content="השכרת רכבים בקראון הייטס, ברוקלין — הזמנה פשוטה ומאובטחת, תיעוד מלא ודירוגים אמיתיים.">
  <meta property="og:url" content="https://crowndrive770.com/">
  <meta property="og:image" content="https://crowndrive770.com/icons/og-ad.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="1200">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Crown Drive · השכרת רכבים · קראון הייטס">
  <meta name="twitter:description" content="השכרת רכבים בקראון הייטס, ברוקלין — הזמנה פשוטה ומאובטחת.">
  <meta name="twitter:image" content="https://crowndrive770.com/icons/og-ad.jpg">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://amar-75684-default-rtdb.firebaseio.com" crossorigin>
  <!-- The Firebase SDK is boot-critical (nothing real renders until it loads) but the <script> tags sit at
       the end of <body>, so they only start downloading after the whole page parses. Preload them here so
       they fetch immediately, in parallel with the CSS and app modules. (Classic scripts → no crossorigin.) -->
  <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js">
  <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js">
  <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js">
  <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=118">
  <!-- start the app's own JS modules downloading immediately, in parallel (execution order unchanged) -->
  <link rel="modulepreload" href="js/app.js?v=118">
  <link rel="modulepreload" href="js/views.js">
  <link rel="modulepreload" href="js/store.js">
  <!-- The boot-critical leaf modules too — otherwise the browser only discovers them after app.js/views.js/
       store.js parse, adding a round-trip on high-latency mobile. Preloading flattens that waterfall. -->
  <link rel="modulepreload" href="js/firebase.js">
  <link rel="modulepreload" href="js/core.js">
  <link rel="modulepreload" href="js/db.js">
  <link rel="modulepreload" href="js/auth.js">
  <!-- Registers before the Firebase CDN scripts so it can catch a boot failure (blocked CDN / offline) and
       show a retry instead of a dead spinner. Cancelled by the app on first paint. -->
  <script src="js/boot-watchdog.js"></script>
</head>

  <nav id="main-nav" aria-label="ניווט ראשי"></nav>
</header>
<main id="app" tabindex="-1" aria-busy="true"><div class="app-loader boot-splash"><img src="icons/icon-192.png" alt="" class="splash-logo"><b class="splash-name">CROWN DRIVE</b><div class="spinner"></div></div></main>
<div id="toast" role="status" aria-live="polite"></div>
<div id="network-status" class="network-status" role="status" aria-live="polite" hidden></div>
<div id="modal-root"></div>
<nav id="bottom-nav" class="bottom-nav hide" aria-label="ניווט תחתון"></nav>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/tawk.js?v=118"></script>
<script type="module" src="js/app.js?v=118"></script>
<script src="js/sw-register.js?v=118"></script>
</body>
</html>
